name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/menonpg/medgeclaw:latest
            ghcr.io/menonpg/medgeclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/user/packages/container/medgeclaw" \
            -d '{"visibility":"public"}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print('visibility:', d.get('visibility', d.get('message','error')))"
